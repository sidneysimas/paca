name: plugin-sdk-frontend-pr-ci

on:
  pull_request:
    paths:
      - "plugins/sdk/frontend/**"
      - ".github/workflows/plugin-sdk-frontend-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-sdk-frontend-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: plugins/sdk/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-plugin-sdk-frontend-${{ hashFiles('plugins/sdk/frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-plugin-sdk-frontend-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build library
        run: bun run build
